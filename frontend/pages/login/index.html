<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela login</title>
    <link rel="stylesheet" href="../../shared/styles/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container-centralizado">
    <div class="card-form">
      <h1 class="titulo-principal">LOGIN</h1>

      <form id="loginForm">
        <div class="grupo-input">
          <label for="email">E-mail</label>
          <input type="email" class="campo-texto" id="email" required autocomplete="email">
        </div>
        <div class="grupo-input">
          <label for="senha">Senha</label>
          <input type="password" class="campo-texto" id="senha" required>
        </div>

        <button type="submit" class="botao-destaque">ENTRAR</button>

      </form>

      <p class="texto-auxiliar">Não tem uma conta? <a href="../cadastro/index.html">Cadastre-se</a></p>
    </div>

  </main>
  <script src="./login.js"></script>
</body>
</html>
